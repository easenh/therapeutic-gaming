<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Therapeutic Gaming Finder</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="koi-layer" id="koiLayer" aria-hidden="true">
  <!-- Koi templates (SVGs). JS will randomize position, direction, speed, and depth. -->
  <svg class="koi" viewBox="0 0 220 120" data-depth="0.8">
    <g class="fish">
      <path class="body" d="M20 60 C55 25, 110 20, 150 55 C175 75, 205 70, 212 60 C205 50, 175 45, 150 65 C110 95, 55 95, 20 60Z"/>
      <path class="tail" d="M18 60 C6 48, 6 72, 18 60Z"/>
      <path class="fin" d="M95 72 C85 78, 80 88, 92 86 C100 84, 106 78, 95 72Z"/>
      <circle class="eye" cx="176" cy="56" r="3.6"/>
      <!-- sparkles -->
      <circle class="sparkle s1" cx="170" cy="45" r="2.2"/>
      <circle class="sparkle s2" cx="185" cy="42" r="1.6"/>
      <circle class="sparkle s3" cx="195" cy="52" r="1.9"/>
      <!-- gentle vein-like highlight -->
      <path class="shine" d="M60 58 C90 40, 125 42, 155 56"/>
    </g>
  </svg>

  <svg class="koi" viewBox="0 0 220 120" data-depth="0.55">
    <g class="fish">
      <path class="body" d="M20 60 C55 25, 110 20, 150 55 C175 75, 205 70, 212 60 C205 50, 175 45, 150 65 C110 95, 55 95, 20 60Z"/>
      <path class="tail" d="M18 60 C6 48, 6 72, 18 60Z"/>
      <path class="fin" d="M95 72 C85 78, 80 88, 92 86 C100 84, 106 78, 95 72Z"/>
      <circle class="eye" cx="176" cy="56" r="3.6"/>
      <circle class="sparkle s1" cx="170" cy="45" r="2.2"/>
      <circle class="sparkle s2" cx="185" cy="42" r="1.6"/>
      <circle class="sparkle s3" cx="195" cy="52" r="1.9"/>
      <path class="shine" d="M60 58 C90 40, 125 42, 155 56"/>
    </g>
  </svg>

  <svg class="koi" viewBox="0 0 220 120" data-depth="0.35">
    <g class="fish">
      <path class="body" d="M20 60 C55 25, 110 20, 150 55 C175 75, 205 70, 212 60 C205 50, 175 45, 150 65 C110 95, 55 95, 20 60Z"/>
      <path class="tail" d="M18 60 C6 48, 6 72, 18 60Z"/>
      <path class="fin" d="M95 72 C85 78, 80 88, 92 86 C100 84, 106 78, 95 72Z"/>
      <circle class="eye" cx="176" cy="56" r="3.6"/>
      <circle class="sparkle s1" cx="170" cy="45" r="2.2"/>
      <circle class="sparkle s2" cx="185" cy="42" r="1.6"/>
      <circle class="sparkle s3" cx="195" cy="52" r="1.9"/>
      <path class="shine" d="M60 58 C90 40, 125 42, 155 56"/>
    </g>
  </svg>
</div>
  </header>

  <main class="wrap">
    <section class="controls card">
      <div class="control-row">
        <label class="field">
          <span>Search</span>
          <input id="search" type="search" placeholder="Try: Minecraft, Overcooked, Abzu…" autocomplete="off"/>
        </label>

        <label class="field">
          <span>Platform</span>
          <select id="platform">
            <option value="">All</option>
          </select>
        </label>

        <label class="field">
          <span>Age group</span>
          <select id="age">
            <option value="">All</option>
          </select>
        </label>
      </div>

      <div class="symptoms">
        <div class="symptom-title">Symptoms targeted</div>
        <div class="symptom-grid" id="symptomGrid"></div>
      </div>

      <div class="hint">
        Tip: tap a game card to open the full details (summary + “aspects & connections”). 
      </div>
    </section>

    <section class="results">
      <div class="results-head">
        <h2>Games</h2>
        <div id="count" class="count"></div>
      </div>
      <div id="grid" class="grid"></div>
    </section>
  </main>

  <dialog id="modal" class="modal">
    <form method="dialog" class="modal-inner">
      <button class="close" aria-label="Close">✕</button>
      <div id="modalBody"></div>
    </form>
  </dialog>

  <footer class="footer">
    <p>
      This site shares educational information and is not medical advice. 
      If a game increases distress, stop and choose a calmer option.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
